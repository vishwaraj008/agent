services:
  - type: web
    name: ai-agent-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: DEALS_BOARD_ID
        sync: false
      - key: WORK_ORDERS_BOARD_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
